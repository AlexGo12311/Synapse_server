<!DOCTYPE html>
<html>
<body>

<h2>🔐 Secure Chat Test</h2>

<!-- LOGIN -->
<h3>Login</h3>
<input id="username" placeholder="username">
<input id="password" placeholder="password" type="password">
<button onclick="login()">Login</button>

<p>Your ID: <b id="myId">not logged in</b></p>

<hr>

<!-- CONNECT -->
<input id="targetInput" placeholder="Enter target user ID"/>
<button onclick="connect()">Connect</button>

<hr>

<!-- CHAT -->
<input id="messageInput" placeholder="Enter message"/>
<button onclick="handleSend()">Send</button>

<div id="log"></div>

<script>
let userId = null;
let ws;

let rsaKeys = null;
let publicKeyBase64 = null;

const publicKeys = {};
const pendingMessages = {};

// ===== UI =====
const log = (text) => {
    document.getElementById("log").innerHTML += "<p>" + text + "</p>";
};

// ===== BASE64 =====
function ab2b64(buf) {
    return btoa(String.fromCharCode(...new Uint8Array(buf)));
}
function b642ab(b64) {
    const bin = atob(b64);
    return Uint8Array.from(bin, c => c.charCodeAt(0));
}

// ===== RSA =====
async function loadOrGenerateRSA() {
    const saved = localStorage.getItem("rsaKeys");

    if (saved) {
        log("🔑 Loading keys from localStorage");

        const parsed = JSON.parse(saved);

        rsaKeys = {
            privateKey: await crypto.subtle.importKey(
                "jwk",
                parsed.privateKey,
                { name: "RSA-OAEP", hash: "SHA-256" },
                true,
                ["decrypt"]
            ),
            publicKey: await crypto.subtle.importKey(
                "spki",
                b642ab(parsed.publicKey),
                { name: "RSA-OAEP", hash: "SHA-256" },
                true,
                ["encrypt"]
            )
        };

        publicKeyBase64 = parsed.publicKey;
        return;
    }

    log("🔑 Generating new RSA");

    rsaKeys = await crypto.subtle.generateKey({
        name: "RSA-OAEP",
        modulusLength: 2048,
        publicExponent: new Uint8Array([1,0,1]),
        hash: "SHA-256"
    }, true, ["encrypt", "decrypt"]);

    const pub = await crypto.subtle.exportKey("spki", rsaKeys.publicKey);
    const priv = await crypto.subtle.exportKey("jwk", rsaKeys.privateKey);

    publicKeyBase64 = ab2b64(pub);

    localStorage.setItem("rsaKeys", JSON.stringify({
        publicKey: publicKeyBase64,
        privateKey: priv
    }));

    log("🔑 Keys saved");
}

// ===== LOGIN =====
async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch("http://localhost:8080/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({username, password})
    });

    if (!res.ok) {
        alert("Login failed");
        return;
    }

    const data = await res.json();
    userId = data.id;

    document.getElementById("myId").innerText = userId;
    log("✅ Logged in as " + username);

    // 🔥 Ключ грузим сразу после логина
    await loadOrGenerateRSA();
}

// ===== CONNECT =====
function connect() {
    if (!userId) {
        alert("Login first!");
        return;
    }

    const targetId = document.getElementById("targetInput").value.trim();
    if (!targetId) {
        alert("Enter target user ID!");
        return;
    }

    ws = new WebSocket(`ws://localhost:8080/ws?userId=${userId}`);

    ws.onopen = () => {
        log("🟢 Connected");

        // отправляем свой pubkey
        ws.send(JSON.stringify({
            type: "set_pubkey",
            from: userId,
            pubKey: publicKeyBase64
        }));

        log("🔑 PubKey sent");

        // запрашиваем ключ собеседника
        ws.send(JSON.stringify({
            type: "get_pubkey",
            to: targetId
        }));
    };

    ws.onmessage = async (msg) => {
        let data;

        try {
            data = JSON.parse(msg.data);
        } catch {
            log("❌ JSON error");
            return;
        }

        // ===== PUBKEY =====
        if (data.type === "pubkey") {
            publicKeys[data.from] = await crypto.subtle.importKey(
                "spki",
                b642ab(data.pubKey),
                { name: "RSA-OAEP", hash: "SHA-256" },
                true,
                ["encrypt"]
            );

            log("🔑 Key received from " + data.from);

            flushPending(data.from);
        }

        // ===== MESSAGE =====
        if (data.type === "message") {
            try {
                const aesKey = await decryptRSA(b642ab(data.key));

                const text = await decryptAES(
                    b642ab(data.data),
                    b642ab(data.iv),
                    aesKey
                );

                log("💬 " + data.from + ": " + text);
            } catch {
                log("❌ Decrypt error");
            }
        }
    };
}

// ===== AES =====
async function generateAES() {
    return await crypto.subtle.generateKey(
        { name: "AES-GCM", length: 256 },
        true,
        ["encrypt","decrypt"]
    );
}

async function encryptAES(text, key) {
    const iv = crypto.getRandomValues(new Uint8Array(12));

    const cipher = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv },
        key,
        new TextEncoder().encode(text)
    );

    return { cipher, iv };
}

async function decryptAES(cipher, iv, key) {
    const dec = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv },
        key,
        cipher
    );

    return new TextDecoder().decode(dec);
}

// ===== RSA =====
async function encryptRSA(aesKey, publicKey) {
    const raw = await crypto.subtle.exportKey("raw", aesKey);

    return await crypto.subtle.encrypt(
        { name: "RSA-OAEP" },
        publicKey,
        raw
    );
}

async function decryptRSA(encrypted) {
    const raw = await crypto.subtle.decrypt(
        { name: "RSA-OAEP" },
        rsaKeys.privateKey,
        encrypted
    );

    return await crypto.subtle.importKey(
        "raw",
        raw,
        { name: "AES-GCM" },
        true,
        ["decrypt"]
    );
}

// ===== SEND =====
function handleSend() {
    const text = document.getElementById("messageInput").value;
    const targetId = document.getElementById("targetInput").value;

    if (!text || !targetId) {
        log("❌ empty msg");
        return;
    }

    sendMessage(text, targetId);
}

async function sendMessage(text, receiverId) {
    if (!publicKeys[receiverId]) {
        log("⏳ Key not ready, saving...");

        if (!pendingMessages[receiverId]) {
            pendingMessages[receiverId] = [];
        }

        pendingMessages[receiverId].push(text);

        ws.send(JSON.stringify({
            type: "get_pubkey",
            to: receiverId
        }));

        return;
    }

    const aesKey = await generateAES();
    const encrypted = await encryptAES(text, aesKey);
    const encryptedKey = await encryptRSA(aesKey, publicKeys[receiverId]);

    ws.send(JSON.stringify({
        type: "message",
        to: receiverId,
        data: ab2b64(encrypted.cipher),
        iv: ab2b64(encrypted.iv),
        key: ab2b64(encryptedKey)
    }));

    log("📤 Me: " + text);
}

// ===== QUEUE =====
async function flushPending(user) {
    if (!pendingMessages[user]) return;

    const msgs = pendingMessages[user];

    for (let m of msgs) {
        await sendMessage(m, user);
    }

    delete pendingMessages[user];
}
</script>

</body>
</html>
