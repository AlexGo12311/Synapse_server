<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secure Chat Stable</title>

<style>
body { font-family: sans-serif; max-width: 700px; margin: 20px auto; }
#log { height: 320px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; }
input, button { padding: 8px; margin: 5px; }
.msg-me { color: green; }
.msg-other { color: blue; }
.msg-history { color: gray; }
.msg-error { color: red; }
</style>
</head>

<body>

<h2>🔐 Secure Chat (Stable E2EE FIX)</h2>

<input id="username" placeholder="username">
<input id="password" type="password" placeholder="password">
<button onclick="login()">Login</button>

<p>Your ID: <b id="myId">-</b></p>

<hr>

<input id="targetInput" placeholder="Target user ID">
<button onclick="connect()">Connect</button>

<hr>

<div id="log"></div>

<input id="messageInput" placeholder="Message...">
<button onclick="send()">Send</button>

<script>
let token = null;
let userId = null;
let ws = null;

let rsaKeys = null;
let publicKeyBase64 = null;

const publicKeys = {};
const historyCache = [];
const processed = new Set();

const logDiv = document.getElementById("log");

function log(t,c=""){
    const el = document.createElement("div");
    el.className = c;
    el.innerHTML = t;
    logDiv.appendChild(el);
    logDiv.scrollTop = logDiv.scrollHeight;
}

// ================= BASE64 SAFE =================
function safeB64(str) {
    try {
        if (!str || typeof str !== "string") return null;
        if (!/^[A-Za-z0-9+/=]+$/.test(str)) return null;
        return Uint8Array.from(atob(str), c => c.charCodeAt(0));
    } catch {
        return null;
    }
}

// ================= RSA =================
async function initRSA() {
    const saved = localStorage.getItem("rsaKeys");

    if (saved) {
        const p = JSON.parse(saved);

        rsaKeys = {
            privateKey: await crypto.subtle.importKey(
                "jwk", p.privateKey,
                { name:"RSA-OAEP", hash:"SHA-256" },
                true, ["decrypt"]
            ),
            publicKey: await crypto.subtle.importKey(
                "spki", safeB64(p.publicKey),
                { name:"RSA-OAEP", hash:"SHA-256" },
                true, ["encrypt"]
            )
        };

        publicKeyBase64 = p.publicKey;
        log("🔑 Keys loaded");
        return;
    }

    rsaKeys = await crypto.subtle.generateKey({
        name:"RSA-OAEP",
        modulusLength:2048,
        publicExponent:new Uint8Array([1,0,1]),
        hash:"SHA-256"
    }, true, ["encrypt","decrypt"]);

    const pub = await crypto.subtle.exportKey("spki", rsaKeys.publicKey);
    const priv = await crypto.subtle.exportKey("jwk", rsaKeys.privateKey);

    publicKeyBase64 = btoa(String.fromCharCode(...new Uint8Array(pub)));

    localStorage.setItem("rsaKeys", JSON.stringify({
        publicKey: publicKeyBase64,
        privateKey: priv
    }));

    log("🔑 Keys generated");
}

// ================= LOGIN =================
async function login() {
    const res = await fetch("http://localhost:8080/login", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            username: username.value,
            password: password.value
        })
    });

    const data = await res.json();

    token = data.token;
    userId = data.id;

    myId.innerText = userId;

    await initRSA();

    log("✅ Logged in");
}

// ================= CONNECT =================
function connect() {
    const target = targetInput.value;

    ws = new WebSocket(`ws://localhost:8080/ws?token=${token}`);

    ws.onopen = () => {
        log("🟢 Connected");

        ws.send(JSON.stringify({
            type:"set_pubkey",
            pubKey: publicKeyBase64
        }));

        ws.send(JSON.stringify({
            type:"get_pubkey",
            to: target
        }));

        loadHistory(target);
    };

    ws.onmessage = async (e) => {
        const d = JSON.parse(e.data);

        if (d.type === "pubkey") {
            const key = safeB64(d.pubKey);
            if (!key) return;

            publicKeys[d.from] = await crypto.subtle.importKey(
                "spki",
                key,
                { name:"RSA-OAEP", hash:"SHA-256" },
                true,
                ["encrypt"]
            );

            log("🔑 Key from " + d.from);
            tryDecryptHistory();
        }

        if (d.type === "message") {
            log(`<b>${d.from}:</b> ${d.data}`, "msg-other");
        }
    };
}

// ================= HISTORY =================
async function loadHistory(target) {

    log("⏳ Loading history...", "msg-history");

    const res = await fetch(`http://localhost:8080/history?to=${target}`, {
        headers:{ "Authorization":"Bearer " + token }
    });

    const messages = await res.json();

    for (let m of messages) {
        historyCache.push(m);
    }

    tryDecryptHistory();
}

// ================= DECRYPT HISTORY =================
async function tryDecryptHistory() {

    for (let m of historyCache) {

        const id = m.id || (m.from + m.data);

        if (processed.has(id)) continue;

        // ❗ plain text fallback
        if (!m.key || !m.iv) {
            log(`<b>${m.from}:</b> ${m.data}`, "msg-history");
            processed.add(id);
            continue;
        }

        // wait for key
        if (!publicKeys[m.from]) continue;

        try {
            const aesRaw = await crypto.subtle.decrypt(
                { name:"RSA-OAEP" },
                rsaKeys.privateKey,
                safeB64(m.key)
            );

            const aes = await crypto.subtle.importKey(
                "raw",
                aesRaw,
                { name:"AES-GCM" },
                true,
                ["decrypt"]
            );

            const plain = await crypto.subtle.decrypt(
                { name:"AES-GCM", iv: safeB64(m.iv) },
                aes,
                safeB64(m.data)
            );

            const text = new TextDecoder().decode(plain);

            log(`<b>${m.from}:</b> ${text}`, "msg-history");

            processed.add(id);

        } catch (e) {
            log(`${m.from}: decrypt failed`, "msg-error");
        }
    }
}

// ================= SEND =================
function send() {
    const text = messageInput.value;
    const target = targetInput.value;

    ws.send(JSON.stringify({
        type:"message",
        to:target,
        data:text
    }));

    log(`<b>Me:</b> ${text}`, "msg-me");
}
</script>

</body>
</html>
