<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse Secure Chat</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="crypto.js" defer></script>
    <script src="app.js" defer></script>
</head>

<body>

<div id="authScreen">
    <h2>Synapse</h2>
    <input id="authUsername" placeholder="Username">
    <input id="authPassword" type="password" placeholder="Password">
    <div id="authError"></div>
    <div class="auth-buttons">
        <button class="btn-login" onclick="login()">Login</button>
        <button class="btn-register" onclick="register()">Register</button>
    </div>
</div>

<div id="chatScreen">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="user-info">
                👤 <span id="myUsernameDisplay" style="font-weight: normal;"></span>
            </div>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
        <div id="usersList"></div>
    </div>
    
    <div class="chat-area">
        <div class="chat-header">Chatting with: <span id="activeChatTarget" style="color: #007bff;">Select a user</span></div>
        <div id="log"></div>
        <div class="input-area">
            <input id="messageInput" placeholder="Write a message..." onkeydown="if(event.key==='Enter') send()" disabled>
            <button id="sendBtn" onclick="send()" disabled>Send</button>
        </div>
    </div>
</div>

</body>
</html>
