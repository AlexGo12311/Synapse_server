<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🔐 Secure Chat FINAL</title>

<style>
body { font-family: sans-serif; max-width: 700px; margin: 20px auto; }
#log { height: 320px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; background: #fafafa;}
input, button { padding: 8px; margin: 5px; }
.msg-me { color: green; }
.msg-other { color: blue; }
.msg-error { color: red; }
.msg-warn { color: orange; }
.msg-history { color: gray; }
</style>
</head>

<body>

<h2>🔐 Secure Chat (FINAL)</h2>

<input id="username" placeholder="username">
<input id="password" type="password" placeholder="password">
<button onclick="login()">Login</button>

<p>Your ID: <b id="myId">-</b></p>

<hr>

<input id="targetInput" placeholder="Target user ID">
<button onclick="connect()">Connect</button>

<hr>

<div id="log"></div>

<input id="messageInput" placeholder="Message...">
<button onclick="send()">Send</button>

<script>
let token = null;
let userId = null;
let ws = null;

let rsaKeys = null;
let publicKeyBase64 = null;

const publicKeys = {};
const fingerprints = {};
const pendingMessages = {};

const logDiv = document.getElementById("log");

function log(t, c="") {
    const el = document.createElement("div");
    el.className = c;
    el.innerHTML = t;
    logDiv.appendChild(el);
    logDiv.scrollTop = logDiv.scrollHeight;
}

// ===== BASE64 =====
function toB64(buf) {
    return btoa(String.fromCharCode(...new Uint8Array(buf)));
}
function fromB64(str) {
    const bin = atob(str);
    const arr = new Uint8Array(bin.length);
    for (let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
    return arr;
}

// ===== FINGERPRINT =====
async function getFingerprint(keyBuffer) {
    const hash = await crypto.subtle.digest("SHA-256", keyBuffer);
    return toB64(hash);
}

// ===== RSA INIT =====
async function initRSA() {
    const keyName = "rsaKeys_" + userId;
    const saved = localStorage.getItem(keyName);

    if (saved) {
        const p = JSON.parse(saved);

        rsaKeys = {
            privateKey: await crypto.subtle.importKey(
                "jwk", p.privateKey,
                { name:"RSA-OAEP", hash:"SHA-256" },
                true, ["decrypt"]
            ),
            publicKey: await crypto.subtle.importKey(
                "spki", fromB64(p.publicKey),
                { name:"RSA-OAEP", hash:"SHA-256" },
                true, ["encrypt"]
            )
        };

        publicKeyBase64 = p.publicKey;
        log("🔑 Keys loaded");
        return;
    }

    rsaKeys = await crypto.subtle.generateKey({
        name:"RSA-OAEP",
        modulusLength:2048,
        publicExponent:new Uint8Array([1,0,1]),
        hash:"SHA-256"
    }, true, ["encrypt","decrypt"]);

    const pub = await crypto.subtle.exportKey("spki", rsaKeys.publicKey);
    const priv = await crypto.subtle.exportKey("jwk", rsaKeys.privateKey);

    publicKeyBase64 = toB64(pub);

    localStorage.setItem(keyName, JSON.stringify({
        publicKey: publicKeyBase64,
        privateKey: priv
    }));

    log("🔑 Keys generated");
}

// ===== CRYPTO =====
async function encryptMessage(text, pubKey) {
    const aes = await crypto.subtle.generateKey(
        { name:"AES-GCM", length:256 },
        true,
        ["encrypt"]
    );

    const iv = crypto.getRandomValues(new Uint8Array(12));

    const cipher = await crypto.subtle.encrypt(
        { name:"AES-GCM", iv },
        aes,
        new TextEncoder().encode(text)
    );

    const raw = await crypto.subtle.exportKey("raw", aes);

    const encKey = await crypto.subtle.encrypt(
        { name:"RSA-OAEP" },
        pubKey,
        raw
    );

    return {
        data: toB64(cipher),
        iv: toB64(iv),
        key: toB64(encKey)
    };
}

// ===== HISTORY =====
async function loadHistory(target) {
    log("⏳ Loading history...", "msg-history");

    const res = await fetch(`http://localhost:8080/history?to=${target}`, {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    if (!res.ok) {
        log("❌ Failed to load history", "msg-error");
        return;
    }

    const messages = await res.json();

    for (let m of messages) {
        try {
            const aesRaw = await crypto.subtle.decrypt(
                { name:"RSA-OAEP" },
                rsaKeys.privateKey,
                fromB64(m.key)
            );

            const aes = await crypto.subtle.importKey(
                "raw",
                aesRaw,
                { name:"AES-GCM" },
                true,
                ["decrypt"]
            );

            const plain = await crypto.subtle.decrypt(
                { name:"AES-GCM", iv: fromB64(m.iv) },
                aes,
                fromB64(m.data)
            );

            const text = new TextDecoder().decode(plain);

            log(`<b>${m.from}:</b> ${text}`, "msg-history");

        } catch {
            log("⚠️ Cannot decrypt old message", "msg-warn");
        }
    }
}

// ===== LOGIN =====
async function login() {
    const res = await fetch("http://localhost:8080/login", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            username: username.value,
            password: password.value
        })
    });

    const data = await res.json();

    token = data.token;
    userId = data.id;

    myId.innerText = userId;

    await initRSA();

    log("✅ Logged in");
}

// ===== CONNECT =====
function connect() {
    const target = targetInput.value;

    ws = new WebSocket(`ws://localhost:8080/ws?token=${token}`);

    ws.onopen = () => {
        log("🟢 Connected");

        ws.send(JSON.stringify({
            type:"set_pubkey",
            pubKey: publicKeyBase64
        }));

        ws.send(JSON.stringify({
            type:"get_pubkey",
            to: target
        }));

        loadHistory(target);
    };

    ws.onmessage = async (e) => {
        const d = JSON.parse(e.data);

        if (d.type === "pubkey") {
            const raw = fromB64(d.pubKey);
            const fp = await getFingerprint(raw);

            if (fingerprints[d.from] && fingerprints[d.from] !== fp) {
                log("⚠️ Key changed!", "msg-warn");
            }

            fingerprints[d.from] = fp;

            publicKeys[d.from] = await crypto.subtle.importKey(
                "spki",
                raw,
                { name:"RSA-OAEP", hash:"SHA-256" },
                true,
                ["encrypt"]
            );

            log("🔑 Key ready: " + d.from);

            if (pendingMessages[d.from]) {
                for (let msg of pendingMessages[d.from]) {
                    sendMessage(msg, d.from);
                }
                delete pendingMessages[d.from];
            }
        }

        if (d.type === "message") {
            try {
                const aesRaw = await crypto.subtle.decrypt(
                    { name:"RSA-OAEP" },
                    rsaKeys.privateKey,
                    fromB64(d.key)
                );

                const aes = await crypto.subtle.importKey(
                    "raw",
                    aesRaw,
                    { name:"AES-GCM" },
                    true,
                    ["decrypt"]
                );

                const plain = await crypto.subtle.decrypt(
                    { name:"AES-GCM", iv: fromB64(d.iv) },
                    aes,
                    fromB64(d.data)
                );

                const text = new TextDecoder().decode(plain);

                log(`<b>${d.from}:</b> ${text}`, "msg-other");

            } catch {
                log("❌ Decrypt error", "msg-error");
            }
        }
    };
}

// ===== SEND =====
function send() {
    const text = messageInput.value;
    const target = targetInput.value;

    if (!text || !target) return;

    sendMessage(text, target);
    messageInput.value = "";
}

async function sendMessage(text, target) {

    if (!publicKeys[target]) {
        log("⏳ Waiting for key...");

        if (!pendingMessages[target]) {
            pendingMessages[target] = [];
        }

        pendingMessages[target].push(text);

        ws.send(JSON.stringify({
            type:"get_pubkey",
            to: target
        }));

        return;
    }

    const encrypted = await encryptMessage(text, publicKeys[target]);

    ws.send(JSON.stringify({
        type:"message",
        to: target,
        ...encrypted
    }));

    log(`<b>Me:</b> ${text}`, "msg-me");
}
</script>

</body>
</html>
